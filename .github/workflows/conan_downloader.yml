name: Detective Conan — Auto Downloader

on:
  # Every Saturday between 7–9 AM Central Time
  # CST = UTC-6  →  13:00 UTC
  # CDT = UTC-5  →  12:00 UTC
  # Running at 13:00 UTC covers both daylight-saving offsets
  schedule:
    - cron: '0 13 * * 6'

  workflow_dispatch:
    inputs:
      episode_override:
        description: 'Force a specific episode number (e.g. 1194)'
        required: false
        default: ''

      magnet_links:
        description: |
          Batch magnet links — one per line, or comma-separated.
          When provided, Nyaa search is skipped entirely.
        required: false
        default: ''

      nyaa_uploader_url:
        description: |
          Optional Nyaa.si uploader profile URL
          (e.g. https://nyaa.si/user/SubsPlease)
        required: false
        default: ''

      custom_search_query:
        description: 'Override the Nyaa search query'
        required: false
        default: ''

      hs_title:
        description: 'Hard-sub title template  (use {ep} as placeholder)'
        required: false
        default: 'Detective Conan - {ep} HS'

      ss_title:
        description: 'Soft-sub title template  (use {ep} as placeholder)'
        required: false
        default: 'Detective Conan - {ep} SS'

env:
  BASE_EPISODE: '1193'
  BASE_DATE: '2026-03-14'

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 240        # 4-hour hard cap

    steps:
      # ── Repo ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── System deps ─────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 ffmpeg

      # ── Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      # ── Run automation ──────────────────────────────────────────────────
      - name: Run Conan automation
        run: python conan_automation_github.py
        env:
          DOODSTREAM_API_KEY:  ${{ secrets.DOODSTREAM_API_KEY }}
          HARD_SUB_FOLDER_ID:  ${{ secrets.HARD_SUB_FOLDER_ID }}
          SOFT_SUB_FOLDER_ID:  ${{ secrets.SOFT_SUB_FOLDER_ID }}
          HTML_FILE:           index.html

          # ── Workflow dispatch inputs (empty string when scheduled) ──
          EPISODE_OVERRIDE:    ${{ github.event.inputs.episode_override  || '' }}
          MAGNET_LINKS:        ${{ github.event.inputs.magnet_links       || '' }}
          NYAA_UPLOADER_URL:   ${{ github.event.inputs.nyaa_uploader_url  || '' }}
          CUSTOM_SEARCH:       ${{ github.event.inputs.custom_search_query || '' }}
          HS_TITLE_TPL:        ${{ github.event.inputs.hs_title           || 'Detective Conan - {ep} HS' }}
          SS_TITLE_TPL:        ${{ github.event.inputs.ss_title           || 'Detective Conan - {ep} SS' }}
